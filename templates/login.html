{% extends "base.html" %}

{% block title %}Login - Lubimovka Readers{% endblock title %}

{% block content %}
    <h1>Login</h1>
    <form method="post">
        {% csrf_token %}
        <label>
            Email
            <input type="email" name="username" required>
        </label>
        <label>
            Password
            <input type="password" name="password" required>
        </label>
        <button type="submit">Login</button>
    </form>
{% endblock content %}
